<head>

    <style>
        body { background: #0b0d0c; color: #e6efea; font-family: system-ui; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }

    <div>
        <h1>Sem ligacao</h1>
